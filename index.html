<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        color: #00f; /*16진수 표기법  */
        text-align: center;
        /* text-shadow:가로거리 세로거리 번짐정도 색상 ; */
        text-shadow: 2px 2px 5px #333;
        letter-spacing: -2x;
      }
      h2 {
        color: pink;
        text-shadow: 7px -7px 1px #125777;
      }
      p {
        color: green; /*색상 이름 표기법  */
        text-align: right;
        /* 줄 간격 조절 */
        line-height: 50px;
        /* line-height: 2.0;*/
        /* line-height: 200%; */
      }
      span {
        color: rgb(255, 0, 0); /*rgb 표기법  */
        /* font-weight: 900; */
        font-weight: bold;
      }
      .hanra {
        color: orangered;
        font-weight: 400;
      }
      .orange {
        color: yellowgreen;
      }
      .red {
        color: paleturquoise;
      }
      .origin {
        color: peru;
      }
      em {
        font-size: 14px;
        color: rgba(0, 0, 0, 0.5);
      }
      .ptext {
        text-align: center;
      }
      .box {
        width: 200px;
        height: 200px;
        background-color: aquamarine;
        text-align: center;
        line-height: 200px;
        /* text-decoration: underline; */
        /* text-decoration: overline; */
      }
      a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>레드향</h1>
    <h2>서보영</h2>
    <p class="ptext">껍질에 붉은 빛이 돌아 <span>레드향</span>이라 불린다</p>
    <p class="red">
      레드향은 <span class="hanra">한라봉</span>과
      <span class="orange">귤</span>을 교배한 것으로
    </p>
    <p class="origin">
      일반 귤보다 2~3배 크고, 과육이 <em>붉고 통통</em> &nbsp&nbsp&nbsp하다
    </p>
    <!-- 박스 안에 글자 중간 정렬 -->
    <div class="box">박스1</div>

    <a href="google.com">구글로 이동</a>
  </body>
</html>
